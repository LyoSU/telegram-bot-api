name: Sync, build & deploy

on:
  schedule:
    - cron: '17 4 * * *'   # щодня 04:17 UTC
  workflow_dispatch:
  push:
    branches: [custom]
    paths-ignore: ['FORK.md', 'README.md']

concurrency:
  group: sync-build-deploy
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  sync:
    # тільки за кроном/вручну; пуш у custom одразу йде в build
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.rebase.outputs.updated }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: custom
          fetch-depth: 0
      - name: Rebase onto upstream
        id: rebase
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/tdlib/telegram-bot-api.git
          git fetch upstream master
          if git merge-base --is-ancestor upstream/master HEAD; then
            echo 'No new upstream commits'
            echo 'updated=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Конфлікт тут → крок падає → ран червоний → GitHub шле нотифікацію.
          git rebase upstream/master
          git push --force-with-lease origin custom
          echo 'updated=true' >> "$GITHUB_OUTPUT"

  build:
    needs: [sync]
    # запускається: після успішного sync з апдейтом; на ручний dispatch; на пуш у custom
    if: >
      !cancelled() && (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        needs.sync.outputs.updated == 'true'
      )
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: custom          # свіжий стан після можливого force-push із sync
          submodules: recursive
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build gperf libssl-dev zlib1g-dev
      - uses: hendrikmuhs/ccache-action@v1
        with:
          key: amd64
          max-size: 2G
      - name: Build
        run: |
          cmake -S . -B build -GNinja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --target telegram-bot-api
          mkdir -p binaries/amd64 && cp build/telegram-bot-api binaries/amd64/
      - name: Extract version
        id: ver
        run: |
          VER=$(grep -oP 'project\(TelegramBotApi VERSION \K[0-9.]+' CMakeLists.txt)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: docker_build
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/lyosu/telegram-bot-api:latest
            ghcr.io/lyosu/telegram-bot-api:${{ steps.ver.outputs.version }}
      - name: Update image digest in Coolify and deploy
        if: ${{ vars.COOLIFY_DEPLOY_ENABLED == 'true' }}
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          SERVICE_UUID: ${{ secrets.COOLIFY_SERVICE_UUID }}
          DIGEST: ${{ steps.docker_build.outputs.digest }}
        run: |
          # Coolify не робить pull для :latest на redeploy — пришпилюємо новий
          # digest у compose через API і деплоїмо. Атомарно і детерміновано.
          curl -fsS -H "Authorization: Bearer $API_TOKEN" \
            "$COOLIFY_URL/api/v1/services/$SERVICE_UUID" -o service.json
          python3 - <<'EOF'
          import base64, json, re
          svc = json.load(open('service.json'))
          compose = svc['docker_compose_raw']
          digest = __import__('os').environ['DIGEST']
          # Coolify normalizes the YAML and may quote the image value — match both.
          compose = re.sub(
              r"image: '?ghcr\.io/lyosu/telegram-bot-api[@:][^\s']+'?",
              f"image: 'ghcr.io/lyosu/telegram-bot-api@{digest}'",
              compose)
          json.dump({'docker_compose_raw': base64.b64encode(compose.encode()).decode()},
                    open('patch.json', 'w'))
          EOF
          curl -fsS -X PATCH -H "Authorization: Bearer $API_TOKEN" \
            -H 'Content-Type: application/json' --data @patch.json \
            "$COOLIFY_URL/api/v1/services/$SERVICE_UUID" -o /dev/null
          curl -fsS -H "Authorization: Bearer $API_TOKEN" \
            "$COOLIFY_URL/api/v1/deploy?uuid=$SERVICE_UUID" -o /dev/null
          echo "Deployed $DIGEST"
